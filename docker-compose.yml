version: '3.8'

services:
  efms-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: efms-mcp-server
    ports:
      - "3000:3000"
    environment:
      - PORT=${PORT:-3000}
      - PUBLIC_EFMS_BASE_URL=${PUBLIC_EFMS_BASE_URL:-http://efms-api-gateway:8080}
      - PUBLIC_MCP_BASE_URL=${PUBLIC_MCP_BASE_URL:-http://localhost:3000}
    networks:
      - efms-network

networks:
  efms-network:
    external: true
    name: efms-network
